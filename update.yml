name: Daily Data Update

on:
  schedule:
    # 02:00 ET = 07:00 UTC — premarket'ten (04:00 ET) 2 saat önce
    - cron: "0 7 * * 1-5"
  workflow_dispatch:   # Actions sekmesinden manuel tetikleme

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: pip install requests beautifulsoup4

      - name: Scraper çalıştır
        run: python scraper.py

      - name: Veriyi commit et
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || \
            git commit -m "data: auto-update $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push
